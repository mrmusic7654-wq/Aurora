name: Build Iris Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: Aurora  # Checkout to Aurora folder

      - name: Clone llama.cpp
        run: |
          cd /home/runner/work/Aurora
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git checkout 1f922254f0c984a8fb9fbaa0c390d7ffae49aedb
          ls -la  # Verify both folders exist

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x Aurora/gradlew
        working-directory: Aurora

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace
        working-directory: Aurora

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iris-debug-apk
          path: Aurora/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
