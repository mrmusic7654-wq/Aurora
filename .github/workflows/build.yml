name: Build Iris Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Use the correct path to cmdline-tools to install NDK
      - name: Install correct NDK version
        run: |
          # Find the cmdline-tools path
          SDK_MANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          if [ ! -f "$SDK_MANAGER" ]; then
            SDK_MANAGER=$ANDROID_HOME/cmdline-tools/tools/bin/sdkmanager
          fi
          echo "Using SDK manager at: $SDK_MANAGER"
          
          # Accept licenses and install NDK
          yes | $SDK_MANAGER --licenses
          $SDK_MANAGER "ndk;26.1.10909125"
          
          # Set NDK path
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iris-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
